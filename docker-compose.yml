name: image-similarity-service

x-api-build: &api-build
  context: .
  additional_contexts:
    rust-packages: ../rust-packages
  target: api-runtime

x-web-build: &web-build
  context: .
  additional_contexts:
    rust-packages: ../rust-packages
  target: web-runtime

x-api-environment: &api-environment
  SOURCE_IMAGE_DIR: ${SOURCE_IMAGE_DIR:-/images}
  MEDIA_SOURCES_FILE: ${MEDIA_SOURCES_FILE:-/app/data/media-sources.txt}
  MEDIA_SOURCES_SEED_FILE: ${MEDIA_SOURCES_SEED_FILE:-/app/config/media-sources.txt}
  STARTUP_INDEXING_ENABLED: ${STARTUP_INDEXING_ENABLED:-false}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-image_similarity}
  CLIP_MODEL_NAME: ${CLIP_MODEL_NAME:-sentence-transformers/clip-ViT-B-32}
  VISUAL_EMBEDDING_BACKEND: ${VISUAL_EMBEDDING_BACKEND:-onnx}
  VISUAL_EMBEDDING_ENABLED: ${VISUAL_EMBEDDING_ENABLED:-true}
  VECTOR_SIZE: ${VECTOR_SIZE:-512}
  THUMBNAIL_DIR: ${THUMBNAIL_DIR:-/app/data/thumbnails}
  UPLOAD_DIR: ${UPLOAD_DIR:-/app/data/uploads}
  PROCESSING_WORKFLOWS_FILE: ${PROCESSING_WORKFLOWS_FILE:-/app/data/processing-workflows.json}
  VOICE_REGISTRY_PATH: ${VOICE_REGISTRY_PATH:-/app/data/recognized-voices.json}
  MODEL_BUNDLE_DIR: ${MODEL_BUNDLE_DIR:-/app/data/models/bundles}
  MODEL_HF_CACHE_DIR: ${MODEL_HF_CACHE_DIR:-/app/data/models/hf-cache}
  MODEL_HF_TOKEN: ${MODEL_HF_TOKEN:-}
  IMAGE_EXTENSIONS: ${IMAGE_EXTENSIONS:-.jpg,.jpeg,.png,.webp,.bmp,.tif,.tiff,.gif}
  AUDIO_EXTENSIONS: ${AUDIO_EXTENSIONS:-.mp3,.wav,.flac,.m4a,.aac,.ogg,.opus}
  PDF_EXTENSIONS: ${PDF_EXTENSIONS:-.pdf}
  PDF_RENDER_DPI: ${PDF_RENDER_DPI:-144}
  PDF_MAX_PAGES: ${PDF_MAX_PAGES:-100}
  PDF_SUMMARY_PAGES: ${PDF_SUMMARY_PAGES:-8}
  IMAGE_SOURCES: ${IMAGE_SOURCES:-}
  DEFAULT_SEARCH_LIMIT: ${DEFAULT_SEARCH_LIMIT:-12}
  DUPLICATE_HASH_DISTANCE: ${DUPLICATE_HASH_DISTANCE:-8}
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
  VIDEO_FRAME_STRIDE: ${VIDEO_FRAME_STRIDE:-30}
  VIDEO_MAX_FRAMES: ${VIDEO_MAX_FRAMES:-}
  GIF_SAMPLE_FRAMES: ${GIF_SAMPLE_FRAMES:-16}
  GIF_MAX_DECODE_FRAMES: ${GIF_MAX_DECODE_FRAMES:-512}
  GIF_PREVIEW_FRAMES: ${GIF_PREVIEW_FRAMES:-16}
  GIF_DEFAULT_FRAME_DELAY_MS: ${GIF_DEFAULT_FRAME_DELAY_MS:-100}
  GIF_MOTION_WEIGHT: ${GIF_MOTION_WEIGHT:-0.2}
  OCR_ENABLED: ${OCR_ENABLED:-true}
  OCR_COMMAND: ${OCR_COMMAND:-tesseract}
  OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
  OCR_MAX_FRAMES: ${OCR_MAX_FRAMES:-4}
  BIND_ADDR: ${CONTAINER_BIND_ADDR:-0.0.0.0:8000}
  FRONTEND_SERVING_ENABLED: "false"

services:
  api:
    build: *api-build
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment: *api-environment
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - ${HOST_PICTURES_DIR:-${HOME}/Pictures}:/media/pictures:ro
      - ${HOST_VIDEO_DIR:-${HOME}/Videos}:/media/videos:ro
      - ${HOST_AUDIO_DIR:-${HOME}/Music}:/media/audio:ro
      - ${APP_DATA_DIR:-./.dev-data/app}:/app/data
    depends_on:
      qdrant:
        condition: service_started

  web:
    build: *web-build
    environment:
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
    ports:
      - "127.0.0.1:${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_started

  test:
    image: rust:1-bookworm
    profiles: ["test"]
    working_dir: /workspace/image-similarity-service/backend
    command: ["cargo", "test"]
    volumes:
      - .:/workspace/image-similarity-service
      - ../rust-packages:/workspace/rust-packages:ro

  seed-data:
    profiles: ["seed"]
    build: *api-build
    environment:
      SAMPLE_FACE_DATA_DIR: ${SAMPLE_FACE_DATA_DIR:-/seed/local}
      SAMPLE_FACE_COUNT: ${SAMPLE_FACE_COUNT:-150}
      SAMPLE_FACE_URL: ${SAMPLE_FACE_URL:-https://thispersondoesnotexist.com/}
      SAMPLE_FACE_DELAY_MS: ${SAMPLE_FACE_DELAY_MS:-1000}
      SAMPLE_FACE_MAX_ATTEMPTS: ${SAMPLE_FACE_MAX_ATTEMPTS:-750}
      SAMPLE_FACE_CLEAR_GENERATED: ${SAMPLE_FACE_CLEAR_GENERATED:-true}
    command: ["seed_dummy_data"]
    volumes:
      - ${SAMPLE_FACE_HOST_DIR:-./sample-images}:/seed/local
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "127.0.0.1:6333:6333"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ${QDRANT_DATA_DIR:-./.dev-data/qdrant}:/qdrant/storage
      - ${QDRANT_SNAPSHOTS_DIR:-./.dev-data/qdrant-snapshots}:/qdrant/snapshots

networks:
  default:
    ipam:
      config:
        - subnet: 10.89.0.0/24
