name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$CHECKOUT_TOKEN" | base64 -w 0)"

          git init --initial-branch=main .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Set up Bun
        env:
          BUN_VERSION: "1.3.14"
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check frontend formatting
        run: bun run format:check

      - name: Type-check frontend
        run: bun run typecheck

      - name: Build frontend into temporary directory
        run: |
          set -euo pipefail
          rm -rf /tmp/image-similarity-service-frontend-dist
          bunx vite build --outDir /tmp/image-similarity-service-frontend-dist

      - name: Compare checked-in frontend bundle
        run: diff -qr frontend/dist /tmp/image-similarity-service-frontend-dist

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Install Puppeteer Chrome
        run: bunx puppeteer browsers install chrome

      - name: Run Unlighthouse performance audit
        run: bun run test:perf

      - name: Run Playwright tests
        run: bun run test:e2e

  rust-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$CHECKOUT_TOKEN" | base64 -w 0)"

          mkdir -p image-similarity-service
          cd image-similarity-service
          git init --initial-branch=main .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Check out sibling Rust packages
        env:
          RUST_PACKAGES_TOKEN: ${{ secrets.RUST_PACKAGES_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$RUST_PACKAGES_TOKEN" ]; then
            echo "::error::RUST_PACKAGES_TOKEN is required to fetch the private $GITHUB_REPOSITORY_OWNER/rust-packages repository from main."
            exit 1
          fi
          auth_header="$(printf 'x-access-token:%s' "$RUST_PACKAGES_TOKEN" | base64 -w 0)"

          mkdir -p rust-packages
          cd rust-packages
          git init --initial-branch=main .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY_OWNER/rust-packages"
          if ! git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin main; then
            echo "::error::Could not fetch $GITHUB_REPOSITORY_OWNER/rust-packages from main. Check that RUST_PACKAGES_TOKEN has read access to that repository."
            exit 1
          fi
          git checkout --force -B main FETCH_HEAD

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        working-directory: image-similarity-service
        run: cargo fmt --manifest-path backend/Cargo.toml -- --check

      - name: Run Clippy
        working-directory: image-similarity-service
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: image-similarity-service
        run: cargo test --manifest-path backend/Cargo.toml

  qdrant-smoke:
    runs-on: ubuntu-latest
    needs: rust-verify
    steps:
      - name: Check out repository
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$CHECKOUT_TOKEN" | base64 -w 0)"

          mkdir -p image-similarity-service
          cd image-similarity-service
          git init --initial-branch=main .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Check out sibling Rust packages
        env:
          RUST_PACKAGES_TOKEN: ${{ secrets.RUST_PACKAGES_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$RUST_PACKAGES_TOKEN" ]; then
            echo "::error::RUST_PACKAGES_TOKEN is required to fetch the private $GITHUB_REPOSITORY_OWNER/rust-packages repository from main."
            exit 1
          fi
          auth_header="$(printf 'x-access-token:%s' "$RUST_PACKAGES_TOKEN" | base64 -w 0)"

          mkdir -p rust-packages
          cd rust-packages
          git init --initial-branch=main .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY_OWNER/rust-packages"
          if ! git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin main; then
            echo "::error::Could not fetch $GITHUB_REPOSITORY_OWNER/rust-packages from main. Check that RUST_PACKAGES_TOKEN has read access to that repository."
            exit 1
          fi
          git checkout --force -B main FETCH_HEAD

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run real Qdrant smoke test
        working-directory: image-similarity-service
        env:
          COMPOSE_SERVICES: qdrant
          QDRANT_URL: http://127.0.0.1:6333
        run: |
          bash scripts/run-with-compose-services.sh cargo test --manifest-path backend/Cargo.toml qdrant_smoke -- --ignored --nocapture
