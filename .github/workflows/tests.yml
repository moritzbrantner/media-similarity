name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Type-check and build frontend
        run: bun run build

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: image-similarity-service

      - name: Check out sibling Rust packages
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rust-packages
          path: rust-packages

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: image-similarity-service
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Run Clippy
        working-directory: image-similarity-service
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: image-similarity-service
        run: cargo test --manifest-path rust/Cargo.toml
