name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$CHECKOUT_TOKEN" | base64 -w 0)"

          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Set up Bun
        env:
          BUN_VERSION: "1.3.14"
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Type-check and build frontend
        run: bun run build

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$CHECKOUT_TOKEN" | base64 -w 0)"

          mkdir -p image-similarity-service
          cd image-similarity-service
          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Check out sibling Rust packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUST_PACKAGES_TOKEN: ${{ secrets.RUST_PACKAGES_TOKEN }}
        run: |
          set -euo pipefail
          token="${RUST_PACKAGES_TOKEN:-$GITHUB_TOKEN}"
          auth_header="$(printf 'x-access-token:%s' "$token" | base64 -w 0)"

          mkdir -p rust-packages
          cd rust-packages
          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY_OWNER/rust-packages"
          if ! git -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --depth=1 origin; then
            echo "::error::Could not fetch $GITHUB_REPOSITORY_OWNER/rust-packages. If it is private, add a RUST_PACKAGES_TOKEN secret with read access to that repository."
            exit 1
          fi
          git checkout --force FETCH_HEAD

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: image-similarity-service
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Run Clippy
        working-directory: image-similarity-service
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: image-similarity-service
        run: cargo test --manifest-path rust/Cargo.toml
