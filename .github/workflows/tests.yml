name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run deterministic test suite
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q -p pytest_cov --cov=image_similarity --cov-report=term-missing

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: image-similarity-service

      - name: Check out sibling Rust packages
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rust-packages
          path: rust-packages

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: image-similarity-service
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Run Clippy
        working-directory: image-similarity-service
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: image-similarity-service
        run: cargo test --manifest-path rust/Cargo.toml
